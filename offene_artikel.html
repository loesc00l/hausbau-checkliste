<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noch zu kaufen – Hausbau</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4f8;color:#2d3748;min-height:100vh}

/* ── Header ───────────────────────────────────────────────────── */
header{background:#2c5282;color:#fff;padding:12px 24px;display:flex;align-items:center;gap:14px;
  box-shadow:0 2px 8px rgba(0,0,0,.18);position:sticky;top:0;z-index:300}
header h1{font-size:1.15rem;font-weight:700}
.hdr-sub{font-size:.75rem;opacity:.7;margin-top:2px}
.hdr-badge{background:rgba(104,211,145,.25);border:1px solid rgba(104,211,145,.5);
  color:#c6f6d5;border-radius:12px;padding:3px 10px;font-size:.7rem;font-weight:600;
  margin-left:auto;white-space:nowrap}

/* ── Layout ────────────────────────────────────────────────────── */
main{max-width:1100px;margin:0 auto;padding:24px 20px}

/* ── Zusammenfassung ───────────────────────────────────────────── */
.summary-bar{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:28px}
.sum-card{background:#fff;border-radius:8px;padding:14px 20px;
  box-shadow:0 1px 4px rgba(0,0,0,.07);flex:1;min-width:160px;
  border-left:4px solid #68d391}
.sum-label{font-size:.75rem;color:#718096;font-weight:500;margin-bottom:4px}
.sum-value{font-size:1.5rem;font-weight:700;color:#2c5282}
.sum-sub{font-size:.72rem;color:#a0aec0;margin-top:2px}

/* ── Filter-Chips ──────────────────────────────────────────────── */
.filter-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:22px;align-items:center}
.filter-row span{font-size:.78rem;color:#718096;font-weight:600;margin-right:4px}
.chip{padding:5px 14px;border-radius:20px;border:1.5px solid #e2e8f0;
  background:#fff;font-size:.75rem;cursor:pointer;color:#4a5568;transition:all .15s;font-weight:500}
.chip:hover{border-color:#2c5282;color:#2c5282}
.chip.active{background:#2c5282;border-color:#2c5282;color:#fff;font-weight:600}

/* ── Gewerk-Gruppe ─────────────────────────────────────────────── */
.gewerk-section{margin-bottom:32px}
.gewerk-header{display:flex;align-items:center;gap:10px;
  margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid #e2e8f0}
.gewerk-icon{font-size:1.2rem}
.gewerk-title{font-size:1.05rem;font-weight:700;color:#1a365d}
.gewerk-count{font-size:.72rem;background:#ebf4ff;color:#2b6cb0;
  padding:2px 8px;border-radius:10px;font-weight:600}
.gewerk-total{margin-left:auto;font-size:.85rem;font-weight:700;color:#276749}

/* ── Artikel-Karte ─────────────────────────────────────────────── */
.artikel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.artikel-card{background:#fff;border-radius:9px;border:1px solid #e2e8f0;
  padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.05);
  display:flex;flex-direction:column;gap:8px;transition:box-shadow .15s}
.artikel-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.1)}
.art-name{font-size:.9rem;font-weight:700;color:#2d3748;line-height:1.3}
.art-desc{font-size:.75rem;color:#718096;line-height:1.45;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.art-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.meta-pill{font-size:.68rem;padding:2px 8px;border-radius:10px;font-weight:500}
.pill-menge{background:#ebf8ff;color:#2b6cb0}
.pill-ort{background:#f0fff4;color:#276749}
.art-footer{display:flex;align-items:center;justify-content:space-between;
  margin-top:4px;padding-top:8px;border-top:1px solid #f0f4f8}
.art-preis{font-size:.85rem;font-weight:700;color:#2c5282}
.art-gesamt{font-size:.75rem;color:#718096}
.art-link{display:inline-flex;align-items:center;gap:4px;font-size:.72rem;
  color:#2c5282;text-decoration:none;padding:4px 10px;border-radius:6px;
  border:1.5px solid #bee3f8;background:#ebf8ff;transition:all .15s;font-weight:500}
.art-link:hover{background:#2c5282;color:#fff;border-color:#2c5282}

/* ── Leer-Zustand ──────────────────────────────────────────────── */
.empty-state{text-align:center;padding:48px 20px;color:#a0aec0}
.empty-state .emoji{font-size:3rem;margin-bottom:12px}
.empty-state p{font-size:.9rem}

/* ── Lade-Spinner ──────────────────────────────────────────────── */
.loading-overlay{text-align:center;padding:40px;color:#718096;font-size:.9rem}

/* ── Mobile ────────────────────────────────────────────────────── */
@media(max-width:600px){
  main{padding:16px 12px}
  .artikel-grid{grid-template-columns:1fr}
  .summary-bar{gap:8px}
  .sum-card{padding:10px 14px;min-width:130px}
  .sum-value{font-size:1.2rem}
}
</style>
</head>
<body>

<header>
  <div>
    <h1>🛒 Noch zu kaufen</h1>
    <div class="hdr-sub">Hausbau Einkaufsliste – öffentliche Ansicht</div>
  </div>
  <div class="hdr-badge">🌐 Öffentlich</div>
</header>

<main>
  <div id="loadingOverlay" class="loading-overlay">⏳ Artikel werden geladen…</div>

  <div id="pageContent" style="display:none">
    <!-- Zusammenfassung -->
    <div class="summary-bar">
      <div class="sum-card">
        <div class="sum-label">📦 Offene Artikel</div>
        <div class="sum-value" id="sumCount">0</div>
        <div class="sum-sub" id="sumCountSub">von 0 gesamt</div>
      </div>
      <div class="sum-card">
        <div class="sum-label">💰 Noch zu zahlen</div>
        <div class="sum-value" id="sumWert">€ 0</div>
        <div class="sum-sub" id="sumWertSub">Gesamtbudget offen</div>
      </div>
      <div class="sum-card">
        <div class="sum-label">🏷️ Kategorien</div>
        <div class="sum-value" id="sumKat">0</div>
        <div class="sum-sub">Gewerke mit offenen Artikeln</div>
      </div>
    </div>

    <!-- Filter-Chips -->
    <div class="filter-row" id="filterRow">
      <span>Filtern:</span>
      <button class="chip active" data-gewerk="all" onclick="setFilter('all',this)">Alle</button>
    </div>

    <!-- Artikel-Listen -->
    <div id="artikelContainer"></div>
  </div>
</main>

<script>
  let EINKAUF_DATA = [];

  const SB_URL = atob("aHR0cHM6Ly9raW1vZ3N3Y29udXhpanN6cXBxei5zdXBhYmFzZS5jbw==");
  const SB_KEY = atob("ZXlKaGJHY2lPaUpJVXpJMU5pSXNJblI1Y0NJNklrcFhWQ0o5LmV5SnBjM01pT2lKemRYQmhZbUZ6WlNJc0luSmxaaUk2SW10cGJXOW5jM2RqYjI1MWVHbHFjM3B4Y0hGNklpd2ljbTlzWlNJNkluTmxjblpwWTJWZmNtOXNaU0lzSW1saGRDSTZNVGMzTkRFNU56WXlOU3dpWlhod0lqb3lNRGc1Tnpjek5qSTFmUS56bXFtX2pSRzBYbkR3LVJhNE9mZkpYbENyVlBuSXlOWC0wRzA2ZVRzZG9B");

  const GEWERK_ICONS = {
    'Elektro':       '⚡',
    'EDV':           '🖥️',
    'Fenster':       '🪟',
    'Tür':           '🚪',
    'Tor':           '🏗️',
    'Malerarbeiten': '🖌️',
    'Entwässerung':  '💧',
  };

  let checks = {};      // item_key → {gekauft, verbaut}
  let activeFilter = 'all';

  function fmt(val) {
    return new Intl.NumberFormat('de-DE',{style:'currency',currency:'EUR'}).format(val||0);
  }

  function effGesamt(item) {
    if (item.gesamt > 0) return item.gesamt;
    const locs = item.locations || [];
    const fromLocs = locs.reduce((s,l) => s + (l.gesamt>0?l.gesamt:(l.menge||0)*(l.preis_einzel||0)), 0);
    if (fromLocs > 0) return fromLocs;
    return (item.preis||0) * Math.max(locs.length, 1);
  }

  function isGekauft(item) {
    return !!checks[`k:${item.artikel}`]?.gekauft;
  }

  function offeneArtikel() {
    return EINKAUF_DATA.filter(item => !isGekauft(item));
  }

  function setFilter(gewerk, btn) {
    activeFilter = gewerk;
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    renderArtikel();
  }

  function renderSummary(offen) {
    const gewerke = new Set(offen.map(i => i.gewerk));
    const total   = offen.reduce((s,i) => s + effGesamt(i), 0);
    document.getElementById('sumCount').textContent    = offen.length;
    document.getElementById('sumCountSub').textContent = `von ${EINKAUF_DATA.length} gesamt`;
    document.getElementById('sumWert').textContent     = fmt(total);
    document.getElementById('sumKat').textContent      = gewerke.size;
  }

  function renderFilterChips(offen) {
    const row = document.getElementById('filterRow');
    // Behalte "Alle"-Button, entferne alte Chips
    const chips = row.querySelectorAll('[data-gewerk]:not([data-gewerk="all"])');
    chips.forEach(c => c.remove());

    const gewerke = [...new Set(offen.map(i => i.gewerk))].sort();
    gewerke.forEach(g => {
      const btn = document.createElement('button');
      btn.className = 'chip' + (activeFilter === g ? ' active' : '');
      btn.dataset.gewerk = g;
      btn.textContent = (GEWERK_ICONS[g] || '📦') + ' ' + g;
      btn.onclick = () => setFilter(g, btn);
      row.appendChild(btn);
    });
  }

  function renderArtikel() {
    const offen = offeneArtikel();
    renderSummary(offen);
    renderFilterChips(offen);

    const filtered = activeFilter === 'all'
      ? offen
      : offen.filter(i => i.gewerk === activeFilter);

    const container = document.getElementById('artikelContainer');
    container.innerHTML = '';

    if (filtered.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="emoji">🎉</div>
          <p>Alle Artikel in dieser Kategorie wurden bereits gekauft!</p>
        </div>`;
      return;
    }

    // Gruppieren nach Gewerk
    const byGewerk = {};
    filtered.forEach(item => {
      if (!byGewerk[item.gewerk]) byGewerk[item.gewerk] = [];
      byGewerk[item.gewerk].push(item);
    });

    Object.entries(byGewerk).sort(([a],[b]) => a.localeCompare(b)).forEach(([gewerk, items]) => {
      const groupTotal = items.reduce((s,i) => s + effGesamt(i), 0);
      const icon = GEWERK_ICONS[gewerk] || '📦';

      const section = document.createElement('div');
      section.className = 'gewerk-section';
      section.innerHTML = `
        <div class="gewerk-header">
          <span class="gewerk-icon">${icon}</span>
          <span class="gewerk-title">${gewerk}</span>
          <span class="gewerk-count">${items.length} Artikel</span>
          <span class="gewerk-total">${fmt(groupTotal)}</span>
        </div>
        <div class="artikel-grid" id="grid_${gewerk.replace(/[^a-z0-9]/gi,'_')}"></div>`;

      const grid = section.querySelector('.artikel-grid');

      items.forEach(item => {
        const gesamt = effGesamt(item);
        const locs   = item.locations || [];
        const orte   = [...new Set(locs.map(l => l.ort?.split(':')[1] || l.ort).filter(Boolean))];
        const menge  = item.menge_gesamt || locs.reduce((s,l) => s+(l.menge||0), 0) || 1;

        const card = document.createElement('div');
        card.className = 'artikel-card';
        card.innerHTML = `
          <div class="art-name">${item.artikel}</div>
          ${item.beschreibung ? `<div class="art-desc">${item.beschreibung}</div>` : ''}
          <div class="art-meta">
            <span class="meta-pill pill-menge">Menge: ${menge} ${item.art||'Stk.'}</span>
            ${orte.slice(0,3).map(o => `<span class="meta-pill pill-ort">📍 ${o}</span>`).join('')}
            ${orte.length > 3 ? `<span class="meta-pill pill-ort">+${orte.length-3} weitere</span>` : ''}
          </div>
          <div class="art-footer">
            <div>
              <div class="art-preis">${fmt(item.preis)} / ${item.art||'Stk.'}</div>
              ${menge > 1 ? `<div class="art-gesamt">Gesamt: ${fmt(gesamt)}</div>` : ''}
            </div>
            ${item.url ? `<a class="art-link" href="${item.url}" target="_blank" rel="noopener">🔗 Kaufen</a>` : ''}
          </div>`;
        grid.appendChild(card);
      });

      container.appendChild(section);
    });
  }

  async function init() {
    // Schritt 0: Artikel aus Supabase laden
    if (typeof sb !== 'undefined') await loadArtikelVonDB(sb);

    if (EINKAUF_DATA.length === 0) {
      document.getElementById('loadingOverlay').innerHTML =
        '<div class="empty-state"><div class="emoji">📭</div><p>Keine Artikeldaten in der Datenbank vorhanden.<br>Bitte sync_artikel_zu_supabase.py ausführen.</p></div>';
      return;
    }

    document.getElementById('loadingOverlay').style.display = 'none';
    document.getElementById('pageContent').style.display   = 'block';
    renderArtikel();

    // Optional: Kaufstatus aus Supabase laden
    try {
      const sb = window.supabase?.createClient(SB_URL, SB_KEY);
      if (!sb) return;
      const { data: rows, error } = await sb
        .from('hausbau_einkauf_checks')
        .select('item_key,gekauft');
      if (error || !rows) return;
      checks = {};
      rows.forEach(r => { if (r.item_key) checks[r.item_key] = { gekauft: !!r.gekauft }; });
      renderArtikel(); // Mit echtem Status neu rendern
    } catch(e) {
      // Supabase nicht erreichbar – zeige alle Artikel als offen
    }
  }

  init();
</script>
</body>
</html>
