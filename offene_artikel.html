<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noch zu kaufen – Hausbau</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4f8;color:#2d3748;min-height:100vh}

/* ── Header ───────────────────────────────────────────────────── */
header{background:#2c5282;color:#fff;padding:12px 24px;display:flex;align-items:center;gap:14px;
  box-shadow:0 2px 8px rgba(0,0,0,.18);position:sticky;top:0;z-index:300}
header h1{font-size:1.15rem;font-weight:700}
.hdr-sub{font-size:.75rem;opacity:.7;margin-top:2px}
.hdr-badge{background:rgba(104,211,145,.25);border:1px solid rgba(104,211,145,.5);
  color:#c6f6d5;border-radius:12px;padding:3px 10px;font-size:.7rem;font-weight:600;
  margin-left:auto;white-space:nowrap}

/* ── Layout ────────────────────────────────────────────────────── */
main{max-width:1100px;margin:0 auto;padding:24px 20px}

/* ── Zusammenfassung ───────────────────────────────────────────── */
.summary-bar{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:28px}
.sum-card{background:#fff;border-radius:8px;padding:14px 20px;
  box-shadow:0 1px 4px rgba(0,0,0,.07);flex:1;min-width:160px;
  border-left:4px solid #68d391}
.sum-label{font-size:.75rem;color:#718096;font-weight:500;margin-bottom:4px}
.sum-value{font-size:1.5rem;font-weight:700;color:#2c5282}
.sum-sub{font-size:.72rem;color:#a0aec0;margin-top:2px}

/* ── Filter-Chips ──────────────────────────────────────────────── */
.sub-nav{background:#f7fafc;border-bottom:1px solid #e2e8f0;padding:8px 24px;
  display:flex;align-items:center;gap:6px;flex-wrap:wrap;min-height:44px}
.sub-nav-pill{display:inline-flex;align-items:center;gap:4px;padding:5px 13px;
  border-radius:20px;border:1.5px solid #e2e8f0;background:#fff;color:#4a5568;
  font-size:.75rem;font-weight:600;cursor:pointer;white-space:nowrap;
  transition:all .15s;user-select:none}
.sub-nav-pill:hover{border-color:#3182ce;color:#2c5282;background:#ebf8ff}
.sub-nav-pill.active{background:#2c5282;color:#fff;border-color:#2c5282}
.sub-nav-pill .pill-count{font-size:.65rem;opacity:.8;margin-left:2px}

/* ── Gewerk-Gruppe ─────────────────────────────────────────────── */
.gewerk-section{margin-bottom:32px}
.gewerk-header{display:flex;align-items:center;gap:10px;
  margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid #e2e8f0}
.gewerk-icon{font-size:1.2rem}
.gewerk-title{font-size:1.05rem;font-weight:700;color:#1a365d}
.gewerk-count{font-size:.72rem;background:#ebf4ff;color:#2b6cb0;
  padding:2px 8px;border-radius:10px;font-weight:600}
.gewerk-total{margin-left:auto;font-size:.85rem;font-weight:700;color:#276749}

/* ── Artikel-Karte ─────────────────────────────────────────────── */
.artikel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.artikel-card{background:#fff;border-radius:9px;border:1px solid #e2e8f0;
  padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.05);
  display:flex;flex-direction:column;gap:8px;transition:box-shadow .15s}
.artikel-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.1)}
.art-name{font-size:.9rem;font-weight:700;color:#2d3748;line-height:1.3}
.art-desc{font-size:.75rem;color:#718096;line-height:1.45;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.art-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.meta-pill{font-size:.68rem;padding:2px 8px;border-radius:10px;font-weight:500}
.pill-menge{background:#ebf8ff;color:#2b6cb0}
.pill-ort{background:#f0fff4;color:#276749}
.pill-rest{background:#fff5f5;color:#c53030;font-weight:700}
.pill-teil{background:#fffaf0;color:#c05621;font-weight:600}

/* ── Fortschrittsbalken ────────────────────────────────────────── */
.progress-wrap{margin-top:4px}
.progress-bar{height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;margin-bottom:3px}
.progress-fill{height:100%;background:#48bb78;border-radius:3px;transition:width .4s}
.progress-fill.warn{background:#ed8936}
.progress-fill.low{background:#fc8181}
.progress-text{font-size:.65rem;color:#718096;display:flex;justify-content:space-between}

/* ── Teilkauf-Historie ─────────────────────────────────────────── */
.tk-history{margin-top:6px;padding:8px 10px;background:#fffaf0;border-radius:6px;
  border:1px solid #feebc8}
.tk-history-title{font-size:.65rem;font-weight:700;color:#c05621;margin-bottom:5px;
  display:flex;align-items:center;gap:4px}
.tk-entry{display:flex;justify-content:space-between;align-items:center;
  font-size:.68rem;padding:3px 0;border-bottom:1px solid #feebc8}
.tk-entry:last-child{border-bottom:none}
.tk-entry-info{color:#744210}
.tk-entry-amt{font-weight:700;color:#c05621;text-align:right}
.tk-del{cursor:pointer;color:#e53e3e;font-size:.7rem;padding:0 4px;
  background:none;border:none;opacity:.5;transition:opacity .15s}
.tk-del:hover{opacity:1}

/* ── Karten-Footer ─────────────────────────────────────────────── */
.art-footer{display:flex;align-items:center;justify-content:space-between;
  margin-top:4px;padding-top:8px;border-top:1px solid #f0f4f8;gap:8px;flex-wrap:wrap}
.art-preis{font-size:.85rem;font-weight:700;color:#2c5282}
.art-gesamt{font-size:.75rem;color:#718096}
.art-actions{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.art-link{display:inline-flex;align-items:center;gap:4px;font-size:.72rem;
  color:#2c5282;text-decoration:none;padding:4px 10px;border-radius:6px;
  border:1.5px solid #bee3f8;background:#ebf8ff;transition:all .15s;font-weight:500;white-space:nowrap}
.art-link:hover{background:#2c5282;color:#fff;border-color:#2c5282}
.btn-teilkauf{display:inline-flex;align-items:center;gap:4px;font-size:.72rem;
  color:#c05621;cursor:pointer;padding:4px 10px;border-radius:6px;
  border:1.5px solid #fbd38d;background:#fffaf0;transition:all .15s;font-weight:600;
  white-space:nowrap}
.btn-teilkauf:hover{background:#c05621;color:#fff;border-color:#c05621}

/* ── Leer-Zustand ──────────────────────────────────────────────── */
.empty-state{text-align:center;padding:48px 20px;color:#a0aec0}
.empty-state .emoji{font-size:3rem;margin-bottom:12px}
.empty-state p{font-size:.9rem}

/* ── Lade-Spinner ──────────────────────────────────────────────── */
.loading-overlay{text-align:center;padding:40px;color:#718096;font-size:.9rem}

/* ── Modal ─────────────────────────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);
  display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal-box{background:#fff;border-radius:12px;width:100%;max-width:440px;
  box-shadow:0 20px 60px rgba(0,0,0,.25);overflow:hidden}
.modal-title{background:#2c5282;color:#fff;padding:16px 20px;
  font-size:1rem;font-weight:700}
.modal-artikel-name{padding:10px 20px 6px;font-size:.85rem;font-weight:600;
  color:#2d3748;background:#f7fafc;border-bottom:1px solid #e2e8f0}
.modal-form{padding:16px 20px;display:flex;flex-direction:column;gap:12px}
.form-row{display:flex;flex-direction:column;gap:4px}
.form-row label{font-size:.75rem;font-weight:600;color:#4a5568}
.form-row input,.form-row select{padding:8px 10px;border:1.5px solid #e2e8f0;border-radius:6px;
  font-size:.85rem;color:#2d3748;transition:border-color .15s}
.form-row input:focus,.form-row select:focus{outline:none;border-color:#3182ce}
.modal-footer{padding:12px 20px 16px;display:flex;justify-content:flex-end;gap:10px;
  border-top:1px solid #f0f4f8}
.modal-footer button{padding:8px 18px;border-radius:7px;border:1.5px solid #e2e8f0;
  background:#f7fafc;color:#4a5568;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .15s}
.modal-footer button:hover{border-color:#a0aec0}
.modal-footer .btn-save{background:#2c5282;color:#fff;border-color:#2c5282}
.modal-footer .btn-save:hover{background:#2a4365}
.modal-footer .btn-save:disabled{opacity:.5;cursor:not-allowed}
.modal-err{padding:6px 20px;color:#c53030;font-size:.75rem}

/* ── Mobile ────────────────────────────────────────────────────── */
@media(max-width:600px){
  main{padding:16px 12px}
  .artikel-grid{grid-template-columns:1fr}
  .summary-bar{gap:8px}
  .sum-card{padding:10px 14px;min-width:130px}
  .sum-value{font-size:1.2rem}
}
</style>
</head>
<body>

<!-- ── Teilkauf-Modal ───────────────────────────────────────────── -->
<div id="tkModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeTkModal()">
  <div class="modal-box">
    <div class="modal-title">✂️ Teilkauf eintragen</div>
    <div id="tkArtikelName" class="modal-artikel-name"></div>
    <div id="tkModalErr" class="modal-err" style="display:none"></div>
    <div class="modal-form">
      <div class="form-row">
        <label>Datum</label>
        <input type="date" id="tkDatum">
      </div>
      <div class="form-row">
        <label id="tkMengeLabel">Menge</label>
        <input type="number" id="tkMenge" min="0.001" step="0.001" placeholder="z.B. 5">
      </div>
      <div class="form-row">
        <label>Preis / Einheit (€)</label>
        <input type="number" id="tkPreis" min="0" step="0.01" placeholder="z.B. 12.50">
        <span id="tkGesamtPreview" style="font-size:.7rem;color:#718096;margin-top:3px"></span>
      </div>
      <div class="form-row">
        <label>Notiz (optional)</label>
        <input type="text" id="tkNotiz" placeholder="z.B. OBI Filiale München">
      </div>
    </div>
    <div class="modal-footer">
      <button onclick="closeTkModal()">Abbrechen</button>
      <button class="btn-save" id="tkSaveBtn" onclick="saveTeilkauf()">💾 Speichern</button>
    </div>
  </div>
</div>

<header>
  <div>
    <h1>🛒 Noch zu kaufen</h1>
    <div class="hdr-sub">Hausbau Einkaufsliste</div>
  </div>
  <div class="hdr-badge">🌐 Öffentlich</div>
</header>
<div class="sub-nav" id="subNav">
  <span class="sub-nav-pill active" data-gewerk="all" onclick="setFilter('all',this)">Alle</span>
</div>

<main>
  <div id="loadingOverlay" class="loading-overlay">⏳ Artikel werden geladen…</div>

  <div id="pageContent" style="display:none">
    <div class="summary-bar">
      <div class="sum-card">
        <div class="sum-label">📦 Offene Artikel</div>
        <div class="sum-value" id="sumCount">0</div>
        <div class="sum-sub" id="sumCountSub">von 0 gesamt</div>
      </div>
      <div class="sum-card">
        <div class="sum-label">💰 Noch zu zahlen</div>
        <div class="sum-value" id="sumWert">€ 0</div>
        <div class="sum-sub" id="sumWertSub">Restbudget offen</div>
      </div>
      <div class="sum-card">
        <div class="sum-label">✅ Bereits bezahlt</div>
        <div class="sum-value" id="sumBezahlt">€ 0</div>
        <div class="sum-sub">aus Teilkäufen</div>
      </div>
      <div class="sum-card">
        <div class="sum-label">🏷️ Kategorien</div>
        <div class="sum-value" id="sumKat">0</div>
        <div class="sum-sub">Gewerke mit offenen Artikeln</div>
      </div>
    </div>
    <div id="artikelContainer"></div>
  </div>
</main>

<script>
// ── Supabase-Konfiguration ──────────────────────────────────────────
const SB_URL = "https://kimogswconuxijszqpqz.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9." +
  "eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtpbW9nc3djb251eGlqc3pxcHF6Iiw" +
  "icm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NDE5NzYyNSwiZXhwIjoyMD" +
  "g5NzczNjI1fQ.zmqm_jRG0XnDw-Ra4OffJXlCrVPnIyNX-0G06eTsdoA";
const HDR = {
  "apikey": SB_KEY,
  "Authorization": "Bearer " + SB_KEY,
  "Content-Type": "application/json",
  "Prefer": "return=representation"
};

async function sbFetch(table, params) {
  const url = `${SB_URL}/rest/v1/${table}${params ? '?' + params : ''}`;
  const r = await fetch(url, { headers: HDR });
  if (!r.ok) throw new Error(`${r.status}: ${await r.text()}`);
  return r.json();
}
async function sbPost(table, body) {
  const r = await fetch(`${SB_URL}/rest/v1/${table}`, {
    method: 'POST', headers: HDR, body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error(`${r.status}: ${await r.text()}`);
  return r.json();
}
async function sbDelete(table, params) {
  const r = await fetch(`${SB_URL}/rest/v1/${table}?${params}`, {
    method: 'DELETE', headers: { ...HDR, 'Prefer': 'return=minimal' }
  });
  if (!r.ok) throw new Error(`${r.status}: ${await r.text()}`);
}

// ── Globaler State ─────────────────────────────────────────────────
let ARTIKEL  = [];          // alle Artikel aus hausbau_artikel
let TEILKAEUFE = {};        // item_key → [{id, datum, menge, preis_einzel, gesamt, notiz}]
let activeFilter = 'all';
let tkCurrentArtikel = null; // Artikel-Objekt für aktuelles Modal

const GEWERK_ICONS = {
  'Elektro':'⚡', 'EDV':'🖥️', 'Fenster':'🪟', 'Tür':'🚪',
  'Tor':'🏗️', 'Malerarbeiten':'🖌️', 'Entwässerung':'💧',
};

// ── Hilfsfunktionen ────────────────────────────────────────────────
function fmt(val) {
  return new Intl.NumberFormat('de-DE',{style:'currency',currency:'EUR'}).format(val||0);
}
function fmtMenge(val, art) {
  const n = Number(val||0);
  const s = n === Math.floor(n) ? n.toString() : n.toFixed(3).replace(/\.?0+$/,'');
  return `${s} ${art||'Stk.'}`;
}
function itemKey(artikel) { return `k:${artikel}`; }

function mengeGesamt(item) {
  const locs = item.locations || [];
  return item.menge_gesamt || locs.reduce((s,l) => s+(l.menge||0), 0) || 1;
}
function effGesamt(item) {
  if (item.gesamt > 0) return item.gesamt;
  const locs = item.locations || [];
  const fromLocs = locs.reduce((s,l) => s+(l.gesamt>0?l.gesamt:(l.menge||0)*(l.preis_einzel||0)), 0);
  if (fromLocs > 0) return fromLocs;
  return (item.preis||0) * Math.max(locs.length, 1);
}

function mengeTeilgekauft(item) {
  const key = itemKey(item.artikel);
  const tks = TEILKAEUFE[key] || [];
  return tks.reduce((s,t) => s + (parseFloat(t.menge)||0), 0);
}
function mengeOffen(item) {
  const total = mengeGesamt(item);
  const done  = mengeTeilgekauft(item);
  return Math.max(0, total - done);
}
function isVollGekauft(item) {
  return mengeOffen(item) <= 0.0001;
}
function restKosten(item) {
  const rest = mengeOffen(item);
  return rest * (item.preis || 0);
}
function bezahltKosten(item) {
  const key = itemKey(item.artikel);
  const tks = TEILKAEUFE[key] || [];
  return tks.reduce((s,t) => s + (parseFloat(t.gesamt)||0), 0);
}

function offeneArtikel() {
  return ARTIKEL.filter(i => !isVollGekauft(i));
}

// ── Filter ─────────────────────────────────────────────────────────
function setFilter(gewerk, btn) {
  activeFilter = gewerk;
  document.querySelectorAll('.sub-nav-pill').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  renderArtikel();
}

// ── Summary ────────────────────────────────────────────────────────
function renderSummary(offen) {
  const gewerke = new Set(offen.map(i => i.gewerk));
  const totalRest = offen.reduce((s,i) => s + restKosten(i), 0);
  const totalBezahlt = ARTIKEL.reduce((s,i) => s + bezahltKosten(i), 0);
  document.getElementById('sumCount').textContent    = offen.length;
  document.getElementById('sumCountSub').textContent = `von ${ARTIKEL.length} gesamt`;
  document.getElementById('sumWert').textContent     = fmt(totalRest);
  document.getElementById('sumBezahlt').textContent  = fmt(totalBezahlt);
  document.getElementById('sumKat').textContent      = gewerke.size;
}

function renderFilterChips(offen) {
  const nav = document.getElementById('subNav');
  if (!nav) return;
  const total = offen.length;
  const gewerke = [...new Set(offen.map(i => i.gewerk))].sort();
  let html = `<span class="sub-nav-pill${activeFilter==='all'?' active':''}" data-gewerk="all" onclick="setFilter('all',this)">Alle <span class="pill-count">(${total})</span></span>`;
  gewerke.forEach(g => {
    const cnt = offen.filter(i=>i.gewerk===g).length;
    const active = activeFilter === g ? ' active' : '';
    const gS = g.replace(/'/g,"\\'");
    html += `<span class="sub-nav-pill${active}" data-gewerk="${g}" onclick="setFilter('${gS}',this)">${GEWERK_ICONS[g]||'📦'} ${g} <span class="pill-count">(${cnt})</span></span>`;
  });
  nav.innerHTML = html;
}

// ── Artikel rendern ────────────────────────────────────────────────
function renderArtikel() {
  const offen = offeneArtikel();
  renderSummary(offen);
  renderFilterChips(offen);

  const filtered = activeFilter === 'all'
    ? offen
    : offen.filter(i => i.gewerk === activeFilter);

  const container = document.getElementById('artikelContainer');
  container.innerHTML = '';

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="emoji">🎉</div>
        <p>Alle Artikel in dieser Kategorie wurden bereits gekauft!</p>
      </div>`;
    return;
  }

  const byGewerk = {};
  filtered.forEach(item => {
    if (!byGewerk[item.gewerk]) byGewerk[item.gewerk] = [];
    byGewerk[item.gewerk].push(item);
  });

  Object.entries(byGewerk).sort(([a],[b]) => a.localeCompare(b,'de')).forEach(([gewerk, items]) => {
    const groupRest = items.reduce((s,i) => s + restKosten(i), 0);
    const icon = GEWERK_ICONS[gewerk] || '📦';

    const section = document.createElement('div');
    section.className = 'gewerk-section';
    section.innerHTML = `
      <div class="gewerk-header">
        <span class="gewerk-icon">${icon}</span>
        <span class="gewerk-title">${gewerk}</span>
        <span class="gewerk-count">${items.length} Artikel</span>
        <span class="gewerk-total">${fmt(groupRest)}</span>
      </div>
      <div class="artikel-grid" id="grid_${gewerk.replace(/[^a-z0-9]/gi,'_')}"></div>`;

    const grid = section.querySelector('.artikel-grid');
    items.forEach(item => { grid.appendChild(buildCard(item)); });
    container.appendChild(section);
  });
}

function buildCard(item) {
  const key     = itemKey(item.artikel);
  const tks     = TEILKAEUFE[key] || [];
  const mengeG  = mengeGesamt(item);
  const mengeD  = mengeTeilgekauft(item);
  const mengeR  = Math.max(0, mengeG - mengeD);
  const art     = item.art || 'Stk.';
  const pct     = mengeG > 0 ? Math.min(100, (mengeD / mengeG) * 100) : 0;
  const locs    = item.locations || [];
  const orte    = [...new Set(locs.map(l => (l.ort||'').split(':')[1] || l.ort).filter(Boolean))];

  const card = document.createElement('div');
  card.className = 'artikel-card';
  card.id = `card-${key.replace(/[^a-z0-9]/gi,'_')}`;

  // Fortschrittsbalken-Farbe
  const fillClass = pct >= 80 ? '' : pct >= 30 ? ' warn' : ' low';

  // Orte-Pills
  const ortePills = orte.slice(0,3).map(o => `<span class="meta-pill pill-ort">📍 ${o}</span>`).join('') +
    (orte.length > 3 ? `<span class="meta-pill pill-ort">+${orte.length-3} weitere</span>` : '');

  // Mengen-Pills
  let mengePill = '';
  if (tks.length === 0) {
    mengePill = `<span class="meta-pill pill-menge">Menge: ${fmtMenge(mengeG, art)}</span>`;
  } else {
    mengePill = `<span class="meta-pill pill-rest">⏳ Noch: ${fmtMenge(mengeR, art)}</span>` +
      `<span class="meta-pill pill-teil">✅ Gekauft: ${fmtMenge(mengeD, art)}</span>`;
  }

  // Teilkauf-Historie
  let histHTML = '';
  if (tks.length > 0) {
    const rows = tks.map(t => {
      const d = t.datum ? new Date(t.datum).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'2-digit'}) : '–';
      const notiz = t.notiz ? ` · ${t.notiz}` : '';
      const g = parseFloat(t.gesamt) > 0 ? fmt(t.gesamt) : (parseFloat(t.preis_einzel)>0 ? fmt(parseFloat(t.menge)*parseFloat(t.preis_einzel)) : '–');
      return `<div class="tk-entry">
        <span class="tk-entry-info">${d} · ${fmtMenge(t.menge, art)}${notiz}</span>
        <span style="display:flex;align-items:center;gap:4px">
          <span class="tk-entry-amt">${g}</span>
          <button class="tk-del" onclick="deleteTeilkauf(${t.id},'${key.replace(/'/g,"\\'")}',event)" title="Löschen">✕</button>
        </span>
      </div>`;
    }).join('');
    histHTML = `<div class="tk-history">
      <div class="tk-history-title">✂️ Teilkäufe (${tks.length})</div>
      ${rows}
    </div>`;
  }

  // Fortschrittsbalken (nur wenn Teilkäufe vorhanden)
  let progressHTML = '';
  if (tks.length > 0) {
    progressHTML = `<div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill${fillClass}" style="width:${pct.toFixed(1)}%"></div></div>
      <div class="progress-text">
        <span>${pct.toFixed(0)}% beschafft</span>
        <span>${fmtMenge(mengeD, art)} von ${fmtMenge(mengeG, art)}</span>
      </div>
    </div>`;
  }

  const artN = item.artikel.replace(/'/g,"\\'").replace(/"/g,'&quot;');

  card.innerHTML = `
    <div class="art-name">${item.artikel}</div>
    ${item.beschreibung ? `<div class="art-desc">${item.beschreibung}</div>` : ''}
    <div class="art-meta">
      ${mengePill}
      ${ortePills}
    </div>
    ${progressHTML}
    ${histHTML}
    <div class="art-footer">
      <div>
        <div class="art-preis">${fmt(item.preis)} / ${art}</div>
        ${mengeG > 1 ? `<div class="art-gesamt">Rest: ${fmt(restKosten(item))}</div>` : ''}
      </div>
      <div class="art-actions">
        ${item.url ? `<a class="art-link" href="${item.url}" target="_blank" rel="noopener">🔗 Kaufen</a>` : ''}
        <button class="btn-teilkauf" onclick="openTkModal('${artN}')">✂️ Teilkauf</button>
      </div>
    </div>`;

  return card;
}

// ── Teilkauf Modal ────────────────────────────────────────────────
function openTkModal(artikelName) {
  tkCurrentArtikel = ARTIKEL.find(a => a.artikel === artikelName) || null;
  if (!tkCurrentArtikel) return;

  document.getElementById('tkArtikelName').textContent = artikelName;
  document.getElementById('tkMengeLabel').textContent  = `Menge (${tkCurrentArtikel.art || 'Stk.'}) – noch offen: ${fmtMenge(mengeOffen(tkCurrentArtikel), tkCurrentArtikel.art)}`;

  // Standardwerte setzen
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('tkDatum').value  = today;
  document.getElementById('tkMenge').value  = '';
  document.getElementById('tkPreis').value  = tkCurrentArtikel.preis > 0 ? tkCurrentArtikel.preis : '';
  document.getElementById('tkNotiz').value  = '';
  document.getElementById('tkModalErr').style.display = 'none';
  document.getElementById('tkSaveBtn').disabled = false;
  updateGesamtPreview();

  document.getElementById('tkModal').style.display = 'flex';
  document.getElementById('tkMenge').focus();
}

function closeTkModal() {
  document.getElementById('tkModal').style.display = 'none';
  tkCurrentArtikel = null;
}

function updateGesamtPreview() {
  const menge = parseFloat(document.getElementById('tkMenge').value) || 0;
  const preis = parseFloat(document.getElementById('tkPreis').value) || 0;
  const span  = document.getElementById('tkGesamtPreview');
  if (menge > 0 && preis > 0) {
    span.textContent = `Gesamt: ${fmt(menge * preis)}`;
  } else {
    span.textContent = '';
  }
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('tkMenge').addEventListener('input', updateGesamtPreview);
  document.getElementById('tkPreis').addEventListener('input', updateGesamtPreview);
});

async function saveTeilkauf() {
  const btn    = document.getElementById('tkSaveBtn');
  const errDiv = document.getElementById('tkModalErr');
  errDiv.style.display = 'none';

  if (!tkCurrentArtikel) return;

  const datum  = document.getElementById('tkDatum').value;
  const menge  = parseFloat(document.getElementById('tkMenge').value);
  const preis  = parseFloat(document.getElementById('tkPreis').value) || 0;
  const notiz  = document.getElementById('tkNotiz').value.trim();

  if (!datum) { showModalErr('Bitte ein Datum angeben.'); return; }
  if (!menge || menge <= 0) { showModalErr('Bitte eine gültige Menge angeben.'); return; }

  btn.disabled = true;
  btn.textContent = '⏳ Speichern…';

  const key = itemKey(tkCurrentArtikel.artikel);
  const row = {
    item_key:     key,
    artikel:      tkCurrentArtikel.artikel,
    datum,
    menge,
    preis_einzel: preis,
    gesamt:       Math.round(menge * preis * 100) / 100,
    notiz
  };

  try {
    const result = await sbPost('hausbau_teilkaeufe', row);
    const saved = Array.isArray(result) ? result[0] : result;
    if (!TEILKAEUFE[key]) TEILKAEUFE[key] = [];
    TEILKAEUFE[key].push(saved);

    closeTkModal();
    renderArtikel(); // Neu zeichnen
  } catch(e) {
    showModalErr('Fehler beim Speichern: ' + e.message);
    btn.disabled = false;
    btn.textContent = '💾 Speichern';
  }
}

function showModalErr(msg) {
  const errDiv = document.getElementById('tkModalErr');
  errDiv.textContent = '❌ ' + msg;
  errDiv.style.display = 'block';
}

async function deleteTeilkauf(id, key, event) {
  event.stopPropagation();
  if (!confirm('Diesen Teilkauf löschen?')) return;
  try {
    await sbDelete('hausbau_teilkaeufe', `id=eq.${id}`);
    if (TEILKAEUFE[key]) {
      TEILKAEUFE[key] = TEILKAEUFE[key].filter(t => t.id !== id);
    }
    renderArtikel();
  } catch(e) {
    alert('Fehler beim Löschen: ' + e.message);
  }
}

// ── Daten laden ────────────────────────────────────────────────────
async function loadArtikel() {
  const data = await sbFetch('hausbau_artikel', 'select=*&order=gewerk,artikel');
  return data || [];
}

async function loadTeilkaeufe() {
  const data = await sbFetch('hausbau_teilkaeufe', 'select=*&order=datum,id');
  const map = {};
  (data || []).forEach(t => {
    if (!map[t.item_key]) map[t.item_key] = [];
    map[t.item_key].push(t);
  });
  return map;
}

async function init() {
  try {
    document.getElementById('loadingOverlay').textContent = '⏳ Artikel werden geladen…';
    [ARTIKEL, TEILKAEUFE] = await Promise.all([loadArtikel(), loadTeilkaeufe()]);

    if (ARTIKEL.length === 0) {
      document.getElementById('loadingOverlay').innerHTML =
        '<div class="empty-state"><div class="emoji">📭</div>' +
        '<p>Keine Artikeldaten in der Datenbank vorhanden.<br>Bitte sync_artikel_zu_supabase.py ausführen.</p></div>';
      return;
    }

    document.getElementById('loadingOverlay').style.display = 'none';
    document.getElementById('pageContent').style.display   = 'block';
    renderArtikel();
  } catch(e) {
    document.getElementById('loadingOverlay').innerHTML =
      `<div class="empty-state"><div class="emoji">❌</div><p>Fehler beim Laden: ${e.message}</p></div>`;
  }
}

init();
</script>

</html>
